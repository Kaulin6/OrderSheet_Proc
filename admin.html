<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHQ Kit Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-50">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-30">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold text-slate-800">Kit Builder</h1>
        <p class="text-xs text-slate-500">Create and manage equipment kits</p>
      </div>
      <a href="index.html" class="text-sm text-blue-600 hover:text-blue-800 font-medium">&larr; Back to Order Form</a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6 space-y-8">

    <!-- Existing Kits -->
    <section>
      <h2 class="text-lg font-semibold text-slate-800 mb-4">Existing Kits</h2>
      <div id="kits-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="col-span-full flex justify-center py-8"><div class="spinner"></div></div>
      </div>
    </section>

    <!-- Kit Editor Form -->
    <section id="kit-form-section" class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
      <h2 class="text-lg font-semibold text-slate-800 mb-4">Create / Edit Kit</h2>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        <div>
          <label for="kit-name" class="block text-sm font-medium text-slate-700 mb-1">Kit Name *</label>
          <input type="text" id="kit-name" placeholder="e.g., Basic Camera Setup" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
          <label for="kit-description" class="block text-sm font-medium text-slate-700 mb-1">Description</label>
          <input type="text" id="kit-description" placeholder="Optional description" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
          <label for="kit-category" class="block text-sm font-medium text-slate-700 mb-1">Category</label>
          <input type="text" id="kit-category" placeholder="e.g., Security" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
      </div>

      <!-- Add items -->
      <div class="border-t border-slate-200 pt-4 mb-4">
        <h3 class="text-sm font-semibold text-slate-700 mb-3">Kit Items</h3>
        <div class="flex flex-wrap gap-3 items-end">
          <div class="flex-1 min-w-[200px]">
            <label for="product-select" class="block text-xs text-slate-500 mb-1">Product</label>
            <select id="product-select" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
              <option value="">Loading products...</option>
            </select>
          </div>
          <div class="w-20">
            <label for="item-quantity" class="block text-xs text-slate-500 mb-1">Qty</label>
            <input type="number" id="item-quantity" min="1" value="1" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
          </div>
          <button onclick="Admin.addItemRow()" class="bg-slate-700 hover:bg-slate-800 text-white text-sm px-4 py-2 rounded-lg transition-colors">
            + Add Item
          </button>
        </div>
      </div>

      <!-- Kit items list -->
      <div id="kit-items-list" class="mb-4">
        <p class="text-sm text-slate-400 py-4 text-center">No items added yet</p>
      </div>

      <!-- Kit total + actions -->
      <div class="border-t border-slate-200 pt-4 flex items-center justify-between">
        <div>
          <span class="text-sm text-slate-500">Kit Total:</span>
          <span id="kit-total" class="text-lg font-bold text-blue-700 ml-2">$0.00</span>
        </div>
        <div class="flex gap-3">
          <button id="cancel-edit-btn" onclick="Admin.cancelEdit()" class="hidden text-sm text-slate-500 hover:text-slate-700 font-medium px-4 py-2">
            Cancel
          </button>
          <button id="save-kit-btn" onclick="Admin.saveKit()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm px-6 py-2 rounded-lg transition-colors">
            Create Kit
          </button>
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirmation Modal -->
  <div id="delete-modal" class="modal-backdrop">
    <div class="bg-white rounded-xl shadow-xl max-w-sm w-full mx-4 p-6 text-center">
      <div class="text-4xl mb-3 text-red-500">&#9888;</div>
      <h3 class="text-lg font-bold text-slate-800 mb-2">Delete Kit?</h3>
      <p class="text-sm text-slate-500 mb-4">
        Are you sure you want to delete "<span id="delete-kit-name" class="font-medium"></span>"? This cannot be undone.
      </p>
      <div class="flex gap-3 justify-center">
        <button onclick="Admin.closeDeleteModal()" class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800 font-medium">
          Cancel
        </button>
        <button id="confirm-delete-btn" class="bg-red-600 hover:bg-red-700 text-white font-semibold text-sm px-4 py-2 rounded-lg">
          Delete
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/products.js"></script>
  <script src="js/kits.js"></script>
  <script src="js/admin.js"></script>

  <script>
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    Admin.init();
  </script>
</body>
</html>
